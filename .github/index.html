<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Form</title>
  </head>
  <body>
    <form action="">
      <style>
        .background{
          background-image: url(images/im.jpg);
          background-size: 600px;
          height: 1500px;
          width: 1500x;
        }
      </style>
      <div class="background"><h1><span style="color: rgba(253, 10, 212, 0.74)">Payment Form</span></h1>
      <strong><h2 style="color: rgb(255, 0, 0)"><em>Contact Information</em></h2></strong>>
      <p>NAME: <input type="text" required /></p>
      <fieldset>
        <legend>Gender</legend>
        <strong><p>
          MALE<input type="radio" name="GENDER" id="" required />FEMALE<input
            type="radio"
            name="GENDER"
            id=""
            required
          />
        </p></strong>
      </fieldset>
      <strong><p>Address:<textarea name="address" id="address" required></textarea></p></strong>
      <strong><p>EMAIL: <input type="email" name="EMAIL" id="EMAIL" required /></p></strong>
      <strong><p>
        PINCODE: <input type="number" name="PICODE" id="PINCODE" required />
      </p></strong>
      <h2 style="color: rgb(255, 0, 0)"><em>Payment Information</em></h2>
      <div style="text-align: center;">
      <select>
       <em> <option value="visa">visa</option></em>
       <em> <option value="easypasia card">easypasia card</option></em>
        <em><option value="mastercard">mastercard</option></em>
      </select>
      </div>
     <strong><p>Card Number: <input type="number" name="CARD" id="CARD" required /></p></strong>
      <strong><p>
        Expiration Date:
        <input
          type="date"
          name="Expiration Date"
          id="Expiration Date"
          required
        />
      </p></strong>
     <strong><p>CVV: <input type="password" name="CVV" id="CVV" required /></p></strong>
      <div style="text-align: center;"><input type="submit" value="PAY NOW" required /></div>
    </form>
    <style>
      p{
        color: yellow; font-weight: bold; 
      }
    </style>
    <style>
      p{
        font-style: inherit; font-weight: bold;
      }
    </style>
    <style>
      .special{
        color: black;
      }
    </style>
    <style>
      span{
        color: black;
      }
    </style>
    <style>
      body span{
        background-color:skyblue; font-size: larger;
      }
      body em{
        background-color: black; font-size: larger;
      }
    </style>
    <head>
    <style>
      p{
        font-size: 150%;
      }
      h1{
        text-align: center;
      }
      h2{
        text-align: center;
      }
      p{
        text-align: center;
      }
     em{
      text-align: center;
     }
    </style>
    <style>
      fieldset {
    border: none;
    padding: 0;
    margin: 0;
}
    </style>
    </head>
  </body>
  </div>
